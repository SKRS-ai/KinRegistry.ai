<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member ID Generator | Kin Pages Identity</title>
    <style>
        :root {
            --kin-gold: #d4af37;
            --kin-black: #050505;
            --kin-grey: #1a1a1a;
            --kin-white: #e0e0e0;
        }

        body {
            background-color: var(--kin-black); color: #eee;
            font-family: 'Courier New', monospace; margin: 0;
            display: flex; flex-direction: column; align-items: center; padding: 50px;
        }

        /* UI CONTROLS */
        .controls {
            background: var(--kin-grey); border: 1px solid var(--kin-gold);
            padding: 20px; margin-bottom: 50px; width: 400px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; color: var(--kin-gold); text-transform: uppercase; margin-bottom: 5px; }
        input, select {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 8px; box-sizing: border-box; font-family: inherit;
        }

        /* THE ID CARD */
        .id-card {
            width: 400px; height: 250px; background: #000;
            border: 2px solid var(--kin-gold); position: relative;
            padding: 20px; box-sizing: border-box; overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .card-header { border-bottom: 1px solid var(--kin-gold); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 0.9rem; margin: 0; letter-spacing: 2px; }
        
        .card-body { display: flex; margin-top: 15px; gap: 20px; }
        .photo-slot { width: 90px; height: 110px; background: #111; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; color: #444; }

        .info-slot { flex-grow: 1; }
        .name { font-size: 1.1rem; font-weight: bold; color: var(--kin-white); text-transform: uppercase; }
        .detail { font-size: 0.6rem; color: #888; margin-bottom: 4px; }
        .detail b { color: var(--kin-gold); }

        .tier-ribbon {
            position: absolute; bottom: 0; right: 0; left: 0;
            background: var(--kin-gold); color: #000; text-align: center;
            font-size: 0.7rem; font-weight: bold; padding: 5px 0; text-transform: uppercase;
        }

        .qr-code { position: absolute; top: 75px; right: 20px; width: 50px; height: 50px; background: #fff; border: 2px solid #fff; }

        @media print {
            .controls, h1 { display: none; }
            body { background: white; }
            .id-card { box-shadow: none; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="margin:0 0 15px 0; font-size: 0.8rem; color:var(--kin-gold);">IDENTITY BUILDER</h3>
        <div class="input-group">
            <label>Full Legal/Trade Name</label>
            <input type="text" id="in-name" placeholder="E.G. SOLOMON KIN">
        </div>
        <div class="input-group">
            <label>Pronouns / Identity</label>
            <input type="text" id="in-pro" placeholder="E.G. HE / HIM">
        </div>
        <div class="input-group">
            <label>Tier Selection</label>
            <select id="in-tier">
                <option>SOVEREIGN MEMBER</option>
                <option>ASSOCIATE MEMBER</option>
                <option>FELLOWSHIP CANDIDATE</option>
            </select>
        </div>
        <button onclick="window.print()" style="width:100%; background:var(--kin-gold); border:none; padding:10px; font-weight:bold; cursor:pointer;">PRINT ID CARD</button>
    </div>

    <div class="id-card">
        <div class="card-header">
            <h2>KIN PAGES</h2>
            <span style="font-size:0.5rem; color:#444;">VERIFIED // 2026</span>
        </div>

        <div class="card-body">
            <div class="photo-slot">IMAGE DATA</div>
            <div class="info-slot">
                <div class="name">SOLOMON KIN</div>
                <div class="detail">ID: <b>SKR-882-001</b></div>
                <div class="detail">PRONOUNS: <b>HE / HIM</b></div>
                <div class="detail">NODE: <b>ATL-01</b></div>
                <div class="detail">EST: <b>1999</b></div>
            </div>
        </div>

        <div class="qr-code"></div> <div class="tier-ribbon">SOVEREIGN MEMBER</div>
    </div>

    <p style="margin-top: 30px; font-size: 0.6rem; color: #333; text-align: center;">
        THIS IDENTITY CARD IS PROTECTED BY THE GATEKEEPER.<br>
        TAMPERING WITH THE EIN DATA OR VEXILLA HASH IS A BREACH OF MANDATE.
    </p>

</body>
</html>
