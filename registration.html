<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Assembly | Kin Pages Registration</title>
    <style>
        :root { --kin-gold: #d4af37; --kin-black: #050505; --kin-grey: #111; }
        body { 
            background-color: var(--kin-black); color: #eee; 
            font-family: 'Courier New', monospace; margin: 0; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .reg-card {
            width: 100%; max-width: 450px; padding: 40px;
            background: var(--kin-grey); border: 1px solid var(--kin-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 20px;
        }
        h1 { color: var(--kin-gold); text-align: center; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 10px; }
        p.tagline { text-align: center; font-size: 0.6rem; color: #555; margin-bottom: 30px; text-transform: uppercase; }
        
        label { display: block; font-size: 0.65rem; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            background: #000; border: 1px solid #333; color: #fff; 
            font-family: inherit; box-sizing: border-box; 
        }
        .btn-reg { 
            width: 100%; padding: 15px; background: var(--kin-gold); 
            color: #000; border: none; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.7rem; }
        .footer-link a { color: var(--kin-gold); text-decoration: none; }
    </style>
</head>
<body>

    <div class="reg-card">
        <h1>JOIN ASSEMBLY</h1>
        <p class="tagline">Tri-State Legacy Continuation</p>
        
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="sovereign@example.com" required>
        
        <label>Security Key (Password)</label>
        <input type="password" id="reg-pass" placeholder="Min. 6 Characters" required>

        <label>Business Category</label>
        <select id="reg-tier">
            <option value="basic">Basic Tier (Text-Only - FREE)</option>
            <option value="paid">Pro Merchant (Photo/Video - $29/mo)</option>
        </select>
        
        <button class="btn-reg" onclick="executeRegistration()">CREATE ACCOUNT</button>

        <div class="footer-link">
            Already a member? <a href="login.html">Login to Vault</a>
        </div>
    </div>

    

    <script>
        function executeRegistration() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const tier = document.getElementById('reg-tier').value;
            const btn = document.querySelector('.btn-reg');

            // 1. Validation
            if (!email.includes('@') || pass.length < 6) {
                alert("ERROR: Please provide a valid email and a password of at least 6 characters.");
                return;
            }

            btn.innerText = "WRITING TO LEDGER...";
            btn.disabled = true;

            // 2. The Data Structure
            const userData = {
                email: email,
                password: pass,
                tier: tier, // Saves chosen tier
                timestamp: new Date().toISOString()
            };

            // 3. Save to LocalStorage (The Ledger)
            // We use a unique key for every user based on their email
            localStorage.setItem('kin_user_' + email, JSON.stringify(userData));

            // 4. Redirect to Login
            setTimeout(() => {
                alert("SUCCESS: Your credentials have been secured. Please Log In.");
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>
</html>
