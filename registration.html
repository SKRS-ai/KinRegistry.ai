<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join the Assembly | Kin Pages Registration</title>
    <style>
        :root {
            --kin-gold: #d4af37;
            --kin-black: #050505;
            --kin-grey: #111;
        }

        body {
            background-color: var(--kin-black); color: #eee;
            font-family: 'Courier New', monospace; margin: 0; padding: 40px;
            display: flex; justify-content: center;
        }

        .reg-container {
            max-width: 900px; width: 100%; background: var(--kin-grey);
            border: 1px solid var(--kin-gold); padding: 50px;
        }

        h1 { color: var(--kin-gold); text-align: center; letter-spacing: 5px; margin-bottom: 40px; }

        /* TABS FOR ROLE SELECTION */
        .role-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;
        }

        .role-btn {
            padding: 20px; border: 1px solid #333; cursor: pointer; text-align: center;
            transition: 0.3s; background: #000;
        }

        .role-btn.active { border-color: var(--kin-gold); color: var(--kin-gold); background: #0a0a0a; }

        /* FORM STYLING */
        .form-section { display: none; }
        .form-section.active { display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 12px; font-family: inherit; box-sizing: border-box;
        }

        .social-login {
            display: flex; gap: 10px; margin-top: 30px; justify-content: center; border-top: 1px solid #222; padding-top: 30px;
        }

        .btn-social {
            padding: 10px 15px; border: 1px solid #333; font-size: 0.65rem; cursor: pointer; color: #888;
        }

        .btn-submit {
            width: 100%; background: var(--kin-gold); color: #000; border: none;
            padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }

        .info-tag { font-size: 0.65rem; color: var(--kin-gold); margin-top: 5px; }
    </style>
</head>
<body>

    <div class="reg-container">
        <h1>ASSEMBLY REGISTRATION</h1>

        <div class="role-selector">
            <div class="role-btn active" onclick="toggleForm('user')">REGULAR MEMBER<br><span style="font-size:0.6rem;">(Favorites & Newsletters)</span></div>
            <div class="role-btn" onclick="toggleForm('merchant')">ARTIST / MERCHANT<br><span style="font-size:0.6rem;">(Sell Art & Classifieds)</span></div>
        </div>

        <div id="form-user" class="form-section active">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Required for updates">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password">
            </div>
            <p style="font-size: 0.7rem; color: #555;">By joining, you can save favorite businesses and receive the Vexilla AITS newsletter.</p>
            <button class="btn-submit">CREATE MEMBER ACCOUNT</button>
        </div>

        <div id="form-merchant" class="form-section">
            <div class="input-group">
                <label>Full Legal Name / Trade Alias</label>
                <input type="text" placeholder="Required for Vexilla Ledger">
            </div>
            <div class="input-group">
                <label>EIN Number</label>
                <input type="text" placeholder="XX-XXXXXXX (Required for Artists/Merchants)">
                <div class="info-tag">Required to sell Canvas Art and list Sovereign Businesses.</div>
            </div>
            <div class="input-group">
                <label>Contact Email (Optional for Profile)</label>
                <input type="email">
            </div>
            <div class="input-group">
                <label>Entity Identity</label>
                <select>
                    <option>Select Cultural Hub...</option>
                    <option>African-American</option>
                    <option>Hispanic/Latino</option>
                    <option>Asian-Pacific</option>
                    <option>Indigenous</option>
                    <option>Other / Multicultural</option>
                </select>
            </div>
            <button class="btn-submit">REGISTER SOVEREIGN ENTITY</button>
        </div>

        

        <div class="social-login">
            <span style="align-self:center; margin-right:10px; font-size:0.6rem;">OR SIGN IN WITH:</span>
            <div class="btn-social">GOOGLE</div>
            <div class="btn-social">X (TWITTER)</div>
            <div class="btn-social">MICROSOFT</div>
        </div>
    </div>

    <script>
        function toggleForm(role) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('form-' + role).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
