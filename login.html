<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login | KinRegistry.ai Gatekeeper</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --panel: #111; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-box {
            background: var(--panel);
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            border-top: 5px solid var(--gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .brand-logo { color: var(--gold); font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 10px; font-weight: bold; }
        .gate-status { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .btn-login {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-login:hover { background: #f1c40f; }

        .links { margin-top: 25px; font-size: 0.8rem; }
        .links a { color: #888; text-decoration: none; margin: 0 10px; }
        .links a:hover { color: var(--gold); }

        .admin-access {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        .admin-access a { font-size: 0.65rem; color: #333; text-transform: uppercase; text-decoration: none; }
        .admin-access a:hover { color: #555; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand-logo">SOLOMON KIN</div>
    <div class="gate-status">Vexilla AITS Secure Portal</div>

    <form action="dashboard.html">
        <div class="form-group">
            <label>Business Email / Member ID</label>
            <input type="email" placeholder="user@entity.com" required>
        </div>

        <div class="form-group">
            <label>Security Key (Password)</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Authorize Entry</button>
    </form>

    <div class="links">
        <a href="register.html">New Artist? Register</a>
        <span>|</span>
        <a href="index.html">Back to Scroll</a>
    </div>

    <div class="admin-access">
        <a href="admin.html">Access Command Console</a>
    </div>
</div>

</body>
</html>
