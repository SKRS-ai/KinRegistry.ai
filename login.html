<script>
    // THE CREDENTIAL GUARD
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const btn = document.querySelector('.btn-login-main');

        // 1. Basic Validation
        if (!email.includes('@') || pass.length < 6) {
            alert("SECURITY ALERT: Invalid Credential Format.");
            return;
        }

        btn.innerText = "VALIDATING VEXILLA KEY...";

        // 2. Database Check (Simulated for GitHub Pages)
        // In a live environment, this calls your Firebase/Supabase Auth
        const mockDatabaseUser = JSON.parse(localStorage.getItem('kin_user_' + email));

        setTimeout(() => {
            if (mockDatabaseUser && mockDatabaseUser.password === pass) {
                // SUCCESS: Set Secure Session
                localStorage.setItem('kin_session_active', 'true');
                localStorage.setItem('current_user_tier', mockDatabaseUser.tier); // 'basic' or 'paid'
                window.location.href = 'profile.html';
            } else {
                btn.innerText = "ACCESS DENIED";
                alert("ERROR: Credentials not found in the Assembly Ledger. Please Register.");
                btn.innerText = "ENTER VAULT";
            }
        }, 1200);
    }

    // 3. SOCIAL CREDENTIAL HANDSHAKE (Google, X, Microsoft)
    function socialRedirect(platform) {
        console.log(`Contacting ${platform} Auth Servers...`);
        
        // This simulates the OAuth callback
        // When actually connecting to Google/X, you will replace this with their API keys
        alert(`Redirecting to ${platform} Secure Sign-In...`);
        
        // Mocking a successful social login as a 'basic' user
        localStorage.setItem('kin_session_active', 'true');
        localStorage.setItem('current_user_tier', 'basic'); 
        window.location.href = 'profile.html';
    }
</script>
