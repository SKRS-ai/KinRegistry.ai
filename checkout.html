<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout | Kin Pages Ledger</title>
    <style>
        :root {
            --kin-gold: #d4af37;
            --kin-black: #050505;
            --kin-grey: #121212;
            --kin-text: #a0a0a0;
        }

        body {
            background-color: var(--kin-black); color: #eee;
            font-family: 'Courier New', monospace; margin: 0; padding: 20px;
        }

        .checkout-grid {
            max-width: 1100px; margin: 60px auto;
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px;
        }

        .checkout-box { background: var(--kin-grey); border: 1px solid #222; padding: 40px; }
        h2 { color: var(--kin-gold); font-size: 1rem; letter-spacing: 3px; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 15px; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; color: #555; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; font-family: inherit; box-sizing: border-box; }

        /* ORDER SUMMARY */
        .summary-card { background: #0a0a0a; border: 1px solid var(--kin-gold); padding: 30px; position: sticky; top: 100px; }
        .line-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.8rem; }
        .total-row { border-top: 1px solid #333; padding-top: 15px; margin-top: 15px; font-weight: bold; color: var(--kin-gold); }

        .foundation-cut {
            background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--kin-gold);
            padding: 15px; margin-top: 25px; font-size: 0.7rem; color: var(--kin-gold);
            text-align: center;
        }

        .btn-confirm {
            width: 100%; background: var(--kin-gold); color: #000; border: none;
            padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; margin-top: 30px;
        }

        .security-badge { text-align: center; margin-top: 20px; font-size: 0.6rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="checkout-grid">
        
        <div class="checkout-box">
            <h2>SECURE SETTLEMENT</h2>
            <div class="input-row">
                <div>
                    <label>Legal Name</label>
                    <input type="text" placeholder="As seen on EIN/ID">
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="user-email-display" readonly>
                </div>
            </div>

            <label>Card Number</label>
            <input type="text" placeholder="XXXX XXXX XXXX XXXX" style="margin-bottom: 20px;">

            <div class="input-row">
                <div>
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY">
                </div>
                <div>
                    <label>Security Code</label>
                    <input type="text" placeholder="CVC">
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label>Billing Address</label>
                <input type="text" placeholder="Street Address">
            </div>
        </div>

        <div class="summary-card">
            <h2>ORDER SUMMARY</h2>
            <div id="item-list">
                <div class="line-item">
                    <span id="order-item-name">Pro Merchant Tier</span>
                    <span id="order-item-price">$29.00</span>
                </div>
            </div>

            <div class="line-item total-row">
                <span>TOTAL DUE</span>
                <span id="order-total">$29.00</span>
            </div>

            <div class="foundation-cut">
                🛡️ FOUNDATION MANDATE: <span id="mandate-amount">$2.90</span><br>
                <small style="color: #666;">Diverted to Koinonia Grace Foundation</small>
            </div>

            

            <button class="btn-confirm" onclick="executeTransaction()">CONFIRM & SYNC LEDGER</button>
            
            <div class="security-badge">
                VEXILLA AITS ENCRYPTED // TLS 1.3 SECURED
            </div>
        </div>

    </div>

    <script>
        // 1. DATA INITIALIZATION
        document.addEventListener('DOMContentLoaded', () => {
            // Pull user info from local session
            const email = localStorage.getItem('user_email') || "member@kinpages.com";
            document.getElementById('user-email-display').value = email;

            // Check if user is buying Art or a Subscription
            const urlParams = new URLSearchParams(window.location.search);
            const artItem = urlParams.get('item');
            
            if (artItem) {
                // Adjust for Art Purchase (Example: $1,200)
                document.getElementById('order-item-name').innerText = artItem;
                document.getElementById('order-item-price').innerText = "$1,200.00";
                document.getElementById('order-total').innerText = "$1,200.00";
                document.getElementById('mandate-amount').innerText = "$120.00";
            }
        });

        // 2. TRANSACTION EXECUTION
        function executeTransaction() {
            const btn = document.querySelector('.btn-confirm');
            btn.innerText = "VERIFYING FUNDS...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                btn.innerText = "SYNCING TO VEXILLA LEDGER...";
                
                setTimeout(() => {
                    alert("SUCCESS: Transaction Verified. Your Sovereign Status has been updated.");
                    
                    // If it was a subscription, upgrade the tier
                    const urlParams = new URLSearchParams(window.location.search);
                    if (!urlParams.get('item')) {
                        localStorage.setItem('current_user_tier', 'paid');
                    }
                    
                    window.location.href = 'profile.html';
                }, 1500);
            }, 1500);
        }
    </script>

</body>
</html>
