<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Status | Vexilla AITS Heartbeat</title>
    <style>
        :root { --kin-gold: #d4af37; --kin-black: #050505; --kin-grey: #111; --kin-green: #00ff41; }
        body { background: var(--kin-black); color: #eee; font-family: 'Courier New', monospace; margin: 0; padding: 40px; }
        
        .status-container { max-width: 900px; margin: 0 auto; }
        .header { border-bottom: 1px solid var(--kin-gold); padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: var(--kin-gold); letter-spacing: 8px; font-size: 1.5rem; margin: 0; }

        /* GRID SYSTEM */
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .status-card { background: var(--kin-grey); border: 1px solid #222; padding: 30px; position: relative; overflow: hidden; }
        
        .label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 1.2rem; margin-top: 10px; color: #fff; }
        .indicator { width: 8px; height: 8px; background: var(--kin-green); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--kin-green); }

        /* LIVE TERMINAL FEED */
        .terminal { background: #000; border: 1px solid #333; padding: 20px; margin-top: 40px; font-size: 0.7rem; color: var(--kin-green); height: 200px; overflow-y: hidden; position: relative; }
        .terminal-header { position: absolute; top: 0; left: 0; width: 100%; background: #111; padding: 5px 10px; border-bottom: 1px solid #333; color: #555; font-size: 0.6rem; }

        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .btn-back { display: inline-block; margin-top: 40px; color: var(--kin-gold); text-decoration: none; font-size: 0.7rem; border: 1px solid var(--kin-gold); padding: 10px 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--kin-gold); color: #000; }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="header">
            <h1>VEXILLA HEARTBEAT</h1>
            <p style="font-size: 0.6rem; color: #444; margin-top: 5px;">REAL-TIME NETWORK DIAGNOSTICS // BALA CYNWYD HUB</p>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <span class="label">Platform Uptime</span>
                <div class="value"><span class="indicator"></span>99.99%</div>
            </div>
            <div class="status-card">
                <span class="label">Vexilla AITS Sync</span>
                <div class="value" style="color: var(--kin-gold);">ACTIVE</div>
            </div>
            <div class="status-card">
                <span class="label">Ledger Integrity</span>
                <div class="value">VERIFIED</div>
            </div>
            <div class="status-card">
                <span class="label">Identity Encryption</span>
                <div class="value">TLS 1.3 / AES-256</div>
            </div>
        </div>

        

        <div class="terminal" id="terminal-feed">
            <div class="terminal-header">VEXILLA_OS_DIAGNOSTIC_FEED</div>
            <div id="log-container" style="margin-top: 20px;">
                </div>
        </div>

        <a href="index.html" class="btn-back">RETURN TO ASSEMBLY</a>
    </div>

    <script>
        const logs = [
            "> Initializing Vexilla AITS handshake...",
            "> Connection established with Bala Cynwyd Node.",
            "> Scanning Kin Ledger for recent registrations...",
            "> Identity encryption verified (AES-256).",
            "> 10% Foundation Mandate auto-calculation: ONLINE.",
            "> System health: Optimal.",
            "> Awaiting new member entry...",
            "> Pinging multicultural trade hubs...",
            "> Secure session keys rotated successfully."
        ];

        let i = 0;
        function addLog() {
            const container = document.getElementById('log-container');
            const logLine = document.createElement('div');
            logLine.className = 'line';
            logLine.textContent = logs[i % logs.length];
            container.appendChild(logLine);
            
            if (container.children.length > 8) {
                container.removeChild(container.firstChild);
            }
            
            i++;
            setTimeout(addLog, Math.random() * 2000 + 500);
        }

        document.addEventListener('DOMContentLoaded', addLog);
    </script>
</body>
</html>
