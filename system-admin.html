<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vexilla Admin | Kin Pages Command</title>
    <style>
        :root { --kin-gold: #d4af37; --kin-black: #050505; --kin-grey: #121212; }
        body { background: var(--kin-black); color: #eee; font-family: 'Courier New', monospace; margin: 0; display: flex; }

        /* SIDEBAR NAVIGATION */
        .admin-sidebar { width: 250px; height: 100vh; background: #000; border-right: 1px solid var(--kin-gold); padding: 30px; position: sticky; top: 0; }
        .admin-sidebar h2 { color: var(--kin-gold); font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 50px; }
        .nav-item { display: block; color: #666; text-decoration: none; font-size: 0.7rem; margin-bottom: 25px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--kin-gold); }

        /* MAIN PANEL */
        .admin-panel { flex-grow: 1; padding: 60px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px; }
        .admin-card { background: var(--kin-grey); border: 1px solid #222; padding: 25px; text-align: left; }
        .admin-card h4 { font-size: 0.6rem; color: #555; margin: 0; text-transform: uppercase; }
        .admin-card div { font-size: 1.5rem; color: var(--kin-gold); font-weight: bold; margin-top: 10px; }

        /* TABLE VIEW */
        table { width: 100%; border-collapse: collapse; background: #080808; border: 1px solid #222; font-size: 0.75rem; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--kin-gold); color: #444; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #111; color: var(--kin-text); }
        .status-pill { padding: 3px 8px; border-radius: 2px; font-size: 0.6rem; font-weight: bold; }
        .pill-paid { background: rgba(212, 175, 55, 0.2); color: var(--kin-gold); }
        .pill-basic { background: #222; color: #888; }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <h2>VEXILLA AITS</h2>
        <a href="#" class="nav-item active">DASHBOARD</a>
        <a href="#" class="nav-item">MEMBER LEDGER</a>
        <a href="#" class="nav-item">EIN VERIFICATION</a>
        <a href="#" class="nav-item">FOUNDATION LOGS</a>
        <a href="#" class="nav-item">SYSTEM SECURITY</a>
    </aside>

    <main class="admin-panel">
        <div class="header-flex">
            <h1 style="color: var(--kin-gold); letter-spacing: 5px; font-size: 1.2rem;">COMMAND CENTER</h1>
            <span style="font-size: 0.6rem; color: #444;">SYNCED WITH BALA CYNWYD HUB</span>
        </div>

        <div class="stat-strip">
            <div class="admin-card"><h4>Total Members</h4><div id="count-members">0</div></div>
            <div class="admin-card"><h4>Active Nodes</h4><div>1</div></div>
            <div class="admin-card"><h4>Mandate Funds</h4><div id="mandate-pool">$0.00</div></div>
            <div class="admin-card"><h4>System Health</h4><div style="color: #00ff00;">100%</div></div>
        </div>

        <h3 style="font-size: 0.8rem; color: #444; margin-bottom: 20px;">RECENT ASSEMBLY REGISTRATIONS</h3>
        <table>
            <thead>
                <tr>
                    <th>Sovereign ID (Email)</th>
                    <th>Tier Status</th>
                    <th>Join Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="member-table-body">
                </tbody>
        </table>

        
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // WHIZ LOGIC: Scan local storage for all keys starting with 'kin_user_'
            let memberCount = 0;
            let paidCount = 0;
            const tableBody = document.getElementById('member-table-body');

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('kin_user_')) {
                    memberCount++;
                    const user = JSON.parse(localStorage.getItem(key));
                    
                    const row = `
                        <tr>
                            <td>${user.email}</td>
                            <td><span class="status-pill ${user.tier === 'paid' ? 'pill-paid' : 'pill-basic'}">${user.tier.toUpperCase()}</span></td>
                            <td>${user.timestamp ? user.timestamp.split('T')[0] : 'LEGACY'}</td>
                            <td style="color: var(--kin-gold); cursor: pointer;">MANAGE</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;

                    if (user.tier === 'paid') paidCount++;
                }
            }

            document.getElementById('count-members').innerText = memberCount;
            document.getElementById('mandate-pool').innerText = "$" + (paidCount * 2.90).toFixed(2);
        });
    </script>

</body>
</html>
