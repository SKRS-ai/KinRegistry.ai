<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Kin Pages</title>
    <style>
        :root { --kin-gold: #d4af37; --kin-black: #050505; --kin-grey: #121212; --kin-text: #a0a0a0; }
        body { background: var(--kin-black); color: #eee; font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        nav { border-bottom: 1px solid var(--kin-gold); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { color: #666; text-decoration: none; font-size: 0.7rem; border: 1px solid #333; padding: 5px 10px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .profile-header { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 40px; }
        .avatar-box { width: 80px; height: 80px; background: #222; border: 1px solid var(--kin-gold); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .user-info h1 { margin: 0; font-size: 1.5rem; color: var(--kin-gold); letter-spacing: 3px; }
        .tier-tag { font-size: 0.6rem; text-transform: uppercase; background: #333; padding: 2px 8px; border-radius: 3px; }

        /* DASHBOARD GRID */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: var(--kin-grey); border: 1px solid #222; padding: 25px; margin-bottom: 30px; }
        h3 { font-size: 0.8rem; color: var(--kin-gold); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }

        /* FORM ELEMENTS */
        label { display: block; font-size: 0.6rem; color: #555; margin-bottom: 5px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; font-family: inherit; margin-bottom: 15px; box-sizing: border-box; }

        /* PRO SECTION STYLING */
        .pro-locked { background: #080808; border: 1px dashed #333; padding: 40px; text-align: center; }
        .btn-upgrade-now { background: var(--kin-gold); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 15px; font-size: 0.7rem; }
        
        .btn-save { width: 100%; background: transparent; border: 1px solid var(--kin-gold); color: var(--kin-gold); padding: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div style="color: var(--kin-gold); letter-spacing: 3px; font-weight: bold;">KIN PAGES</div>
        <a href="#" onclick="logout()" class="logout-btn">TERMINATE SESSION</a>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="avatar-box">👤</div>
            <div class="user-info">
                <h1 id="display-email">Member ID</h1>
                <span id="tier-badge" class="tier-tag">Syncing...</span>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="main-content">
                <div class="card">
                    <h3>BUSINESS IDENTITY (Text-Only)</h3>
                    <label>Business Name</label>
                    <input type="text" placeholder="e.g. Legacy Accounting Services">
                    
                    <label>Contact Email</label>
                    <input type="email" placeholder="public-contact@domain.com">

                    <label>Business Description</label>
                    <textarea rows="4" placeholder="Briefly describe your services..."></textarea>
                    
                    <button class="btn-save" onclick="alert('Profile Updated')">SAVE DIRECTORY INFO</button>
                </div>

                <div id="media-section" class="card">
                    <h3>PRO MEDIA (Photo/Video)</h3>
                    <div id="media-content">
                        </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="card">
                    <h3>VAULT STATS</h3>
                    <p style="font-size: 0.7rem; color: #666;">Directory Views: 0</p>
                    <p style="font-size: 0.7rem; color: #666;">Foundation Contributions: $0.00</p>
                </div>
                <a href="logo-kin.html" class="btn-upgrade-now" style="width:100%; text-align:center; box-sizing:border-box;">VIEW LOGO KIN</a>
            </div>
        </div>
    </div>

    

    <script>
        // 1. SECURITY CHECK: Is the user logged in?
        const session = localStorage.getItem('kin_session_active');
        if (!session) {
            window.location.href = 'login.html';
        }

        // 2. DATA LOAD: Who is this user?
        const userTier = localStorage.getItem('current_user_tier') || 'basic';
        document.getElementById('tier-badge').innerText = userTier + " TIER";
        
        // 3. TIER ENFORCEMENT
        const mediaBox = document.getElementById('media-content');
        if (userTier === 'paid' || userTier === 'pro') {
            // SHOW THE UPLOADER FOR PAID USERS
            mediaBox.innerHTML = `
                <div style="border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer;" onclick="location.href='media-manager.html'">
                    <p style="font-size: 0.7rem;">+ MANAGE PHOTOS & VIDEOS</p>
                    <p style="font-size: 0.5rem; color: #555;">(3 Images + 1 Video Allowed)</p>
                </div>
            `;
        } else {
            // SHOW THE LOCK FOR BASIC USERS
            mediaBox.innerHTML = `
                <div class="pro-locked">
                    <p style="font-size: 0.7rem; color: #555;">PHOTO & VIDEO UPLOADS ARE LOCKED</p>
                    <a href="upgrade.html" class="btn-upgrade-now">UPGRADE TO PRO</a>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('kin_session_active');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
